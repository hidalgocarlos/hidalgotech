<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}App — AppHub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'], display: ['Cormorant Garamond', 'Georgia', 'serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { brand: { DEFAULT: '#0a0a0b' }, accent: { DEFAULT: '#d97706', hover: '#b45309' } },
          borderRadius: { xl: '2rem', '2xl': '3rem' },
        }
      }
    }
  </script>
  <style>
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.03; pointer-events: none; z-index: 0; }
    input:focus, button:focus { outline: none; }
    [x-cloak] { display: none !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-brand text-gray-100 min-h-screen font-sans antialiased relative">
  <div class="relative z-10">{% block content %}{% endblock %}</div>
  {% block scripts %}{% endblock %}
</body>
</html>
