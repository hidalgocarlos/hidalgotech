# Uso con Traefik en modo local: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# Rutas en http://localhost (puerto 80)
services:
  portal:
    environment:
      - APP_ENV=development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.portal.priority=1"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=8000"
