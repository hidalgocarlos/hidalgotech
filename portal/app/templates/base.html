<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}ToolBox Pro — HidalgoTech{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
            tech: ['Orbitron', 'sans-serif'],
          },
          colors: {
            brand: { DEFAULT: '#0f172a', light: '#1e293b' },
            accent: { DEFAULT: '#2563eb', hover: '#1d4ed8', muted: 'rgba(37,99,235,0.15)' },
            surface: { DEFAULT: '#020617', text: '#f8fafc' },
            whatsapp: '#25D366',
          },
          borderRadius: { xl: '2rem', '2xl': '3rem', '3xl': '4rem' },
          backgroundImage: {
            'noise': "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\")",
          },
        }
      }
    }
  </script>
  <style>
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }
    input:focus, button:focus { outline: none; }
    .font-display-italic { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }
    .font-tech { font-family: 'Orbitron', sans-serif; }
    [x-cloak] { display: none !important; }
    @media (max-width: 640px) {
      .touch-target { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-surface-text min-h-screen font-sans antialiased relative" x-data="{ toast: null }">
  <div class="relative z-10">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
