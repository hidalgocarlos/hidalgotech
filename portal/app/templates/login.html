{% extends "base.html" %}
{% block title %}Iniciar sesión — ToolBox Pro{% endblock %}
{% block content %}
<div class="min-h-[100dvh] flex items-center justify-center px-4 py-12 pt-[max(3rem,env(safe-area-inset-top))] pb-[max(3rem,env(safe-area-inset-bottom))] relative">
  <div class="absolute inset-0 z-0">
    <img src="https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=2600&auto=format&fit=crop" alt="" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-b from-brand/80 via-brand/60 to-surface"></div>
  </div>

  <div class="relative z-10 w-full max-w-[420px] min-w-0">
    <div class="text-center mb-10">
      <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight text-white">
        <span class="font-sans">ToolBox Pro</span>
        <span class="font-tech font-semibold text-whatsapp ml-1">by HidalgoTech</span>
      </h1>
      <p class="mt-3 text-sm text-slate-300 font-mono">// Todas en un solo lugar, con un solo acceso</p>
    </div>

    <div class="rounded-2xl border border-slate-700/50 bg-slate-800/60 backdrop-blur-xl p-8 shadow-2xl shadow-black/40">
      {% if error %}
      <div class="mb-6 rounded-xl bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-300" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="{{ portal_path }}/login" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-400 mb-2">Usuario</label>
          <input type="text" id="username" name="username" required autocomplete="username"
            class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-600/80 text-white placeholder-slate-500
              focus:border-accent focus:ring-2 focus:ring-accent/25 transition-all duration-200"
            placeholder="admin">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-400 mb-2">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-600/80 text-white placeholder-slate-500
              focus:border-accent focus:ring-2 focus:ring-accent/25 transition-all duration-200"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full min-h-[48px] py-3.5 rounded-xl bg-accent text-white font-semibold
            hover:bg-accent-hover active:scale-[0.99]
            focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-surface
            transition-all duration-200">
          Acceder al ToolBox
        </button>
      </form>
      <p class="mt-6 text-center text-xs text-slate-500 font-mono">Hub de herramientas</p>
    </div>
  </div>
</div>
{% endblock %}
