<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ToolBox Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold tracking-tight">ToolBox Pro</h1>
      <p class="text-sm text-slate-500 mt-1">by HidalgoTech</p>
    </div>

    {% if error %}
    <div class="mb-4 rounded-xl bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-300">
      Usuario o contrasena incorrectos.
    </div>
    {% endif %}

    <form method="post" action="/login" class="rounded-2xl border border-slate-800/80 bg-slate-900/40 p-6 space-y-4">
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-400 mb-2">Usuario</label>
        <input type="text" id="username" name="username" required autocomplete="username"
          class="w-full px-4 py-3 rounded-xl bg-slate-800/80 border border-slate-700/80 text-white
            placeholder-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20
            transition-colors focus:outline-none"
          placeholder="admin">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-400 mb-2">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
          class="w-full px-4 py-3 rounded-xl bg-slate-800/80 border border-slate-700/80 text-white
            placeholder-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20
            transition-colors focus:outline-none"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full px-4 py-3 rounded-xl bg-blue-600 text-white font-medium
          hover:bg-blue-500 active:bg-blue-700 transition-colors focus:outline-none
          focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-[#020617]">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
