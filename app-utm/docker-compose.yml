services:
  app-utm:
    build: .
    container_name: app-utm
    restart: always
    env_file:
      - ../.env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - PORTAL_URL=${PORTAL_URL:-https://hidalgotech.com/}
      - APP_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.utm.rule=Host(`hidalgotech.com`) && PathPrefix(`/utm`)"
      - "traefik.http.routers.utm.entrypoints=websecure"
      - "traefik.http.routers.utm.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.utm-strip.stripprefix.prefixes=/utm"
      - "traefik.http.routers.utm.middlewares=utm-strip"
      - "traefik.http.services.utm.loadbalancer.server.port=8000"

networks:
  proxy:
    external: true
