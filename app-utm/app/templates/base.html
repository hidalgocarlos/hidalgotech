<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}UTM y Short links — ToolBox Pro{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ favicon_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'], display: ['Cormorant Garamond', 'Georgia', 'serif'], mono: ['JetBrains Mono', 'monospace'], tech: ['Orbitron', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#0f172a', light: '#1e293b' }, accent: { DEFAULT: '#2563eb', hover: '#1d4ed8' }, surface: { DEFAULT: '#020617', text: '#f8fafc' }, whatsapp: '#25D366' },
          borderRadius: { xl: '2rem', '2xl': '3rem', '3xl': '4rem' },
        }
      }
    }
  </script>
  <style>
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); padding-bottom: env(safe-area-inset-bottom); }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 0; }
    input:focus, button:focus { outline: none; }
    .font-display-italic { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }
    .font-tech { font-family: 'Orbitron', sans-serif; }
    [x-cloak] { display: none !important; }
    .card-cinematic { border-radius: 1.5rem; border: 1px solid rgba(51,65,85,0.5); background: rgba(15,23,42,0.6); backdrop-filter: blur(12px); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-surface-text min-h-screen font-sans antialiased relative">
  <div id="global-progress-wrap" class="fixed top-0 left-0 right-0 z-[100] h-1 bg-transparent pointer-events-none" style="display:none;"><div id="global-progress-bar" class="h-full bg-accent transition-all duration-300" style="width:0%;"></div></div>
  <div id="global-progress-pct" class="fixed right-4 top-16 z-[100] text-sm font-mono text-accent bg-brand/95 px-3 py-1.5 rounded-xl border border-slate-700 pointer-events-none" style="display:none;">0%</div>
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-4 sm:px-6 bg-surface/95 backdrop-blur border-b border-slate-800/80">
    <a href="/" class="font-semibold text-white flex items-center gap-2"><span class="font-sans">ToolBox Pro</span><span class="font-tech text-whatsapp text-sm">by HidalgoTech</span></a>
    <a href="/" class="text-sm text-slate-400 hover:text-white font-medium py-2 px-4 rounded-xl hover:bg-slate-800/60 transition-colors">Menú principal</a>
  </header>
  <div class="relative z-10 min-h-[calc(100vh-3.5rem)]">{% block content %}{% endblock %}</div>
  <script>
  window.AppHubProgress = (function(){
    var wrap, bar, pctEl;
    function el(id){ return document.getElementById(id); }
    return {
      show: function(){ wrap=el('global-progress-wrap'); pctEl=el('global-progress-pct'); if(wrap) wrap.style.display='block'; if(pctEl) pctEl.style.display='block'; this.set(0); },
      set: function(pct){ pct=Math.min(100,Math.max(0,pct)); bar=bar||el('global-progress-bar'); pctEl=pctEl||el('global-progress-pct'); if(bar) bar.style.width=pct+'%'; if(pctEl) pctEl.textContent=Math.round(pct)+'%'; if(pct>=100||pct<=0){ if(wrap) wrap.style.display='none'; if(pctEl) pctEl.style.display='none'; } },
      hide: function(){ wrap=el('global-progress-wrap'); pctEl=el('global-progress-pct'); if(wrap) wrap.style.display='none'; if(pctEl) pctEl.style.display='none'; }
    };
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
