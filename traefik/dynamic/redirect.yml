# Redirect HTTP → HTTPS para el dominio, sin tocar /.well-known (ACME)
http:
  routers:
    to-https:
      entryPoints:
        - web
      rule: "Host(`hidalgotech.com`) && !PathPrefix(`/.well-known/acme-challenge`)"
      middlewares:
        - redirect-https
      service: dummy

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    dummy:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1"
        passHostHeader: true
