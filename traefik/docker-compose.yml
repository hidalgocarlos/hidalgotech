services:
  traefik:
    # v3.6.1+ requiere Docker API 1.40+ (Docker 29+); v3.0 falla con "client version 1.24 is too old"
    image: traefik:v3.6
    container_name: traefik
    restart: always
    command: ["--configFile=/traefik.yml"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/acme.json
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
