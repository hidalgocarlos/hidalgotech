api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    # Sin redirect aquí para que Let's Encrypt pueda completar el reto HTTP-01 en :80.
    # El redirect HTTP→HTTPS se hace por router en traefik/dynamic/redirect.yml
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@hidalgotech.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true
